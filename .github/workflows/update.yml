name: Update Screener-Daten

on:
  schedule:
    - cron: "30 22 * * 1-5"   # Mo–Fr, 22:30 UTC (nach US-Börsenschluss)
  workflow_dispatch:           # erlaubt manuelles Starten per Knopf

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests

      - name: Daten aktualisieren
        run: python update_data.py

      - name: data.json committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-Update data.json"
            git push
          else
            echo "Keine Änderungen."
          fi
